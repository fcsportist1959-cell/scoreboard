<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Live Score</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f7; padding: 20px; display: flex; justify-content: center; }
        .admin-panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .setup-section { display: flex; gap: 10px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }

        .game-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .team-card { background: #fff; border: 2px solid #ecf0f1; padding: 15px; border-radius: 12px; text-align: center; }
        .team-card.home { border-top: 5px solid #3498db; }
        .team-card.away { border-top: 5px solid #e74c3c; }

        .score-val { font-size: 48px; font-weight: 900; margin: 10px 0; color: #2c3e50; }
        
        .btn { cursor: pointer; border: none; border-radius: 6px; padding: 10px; font-weight: bold; transition: 0.2s; width: 100%; margin-bottom: 8px; }
        .btn-plus { background: #2ecc71; color: white; font-size: 20px; }
        .btn-minus { background: #f39c12; color: white; }
        .btn-red-plus { background: #e74c3c; color: white; margin-top: 5px; }
        .btn-red-minus { background: #95a5a6; color: white; font-size: 12px; width: 45%; }
        
        .card-counter { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 5px; }
        .card-mini { width: 12px; height: 18px; background: #e74c3c; border-radius: 2px; display: inline-block; }

        .timer-section { background: #2c3e50; color: white; padding: 20px; border-radius: 12px; margin-top: 20px; text-align: center; }
        .timer-val { font-size: 40px; font-family: monospace; margin-bottom: 15px; color: #2ecc71; }
        .timer-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-timer { background: #3498db; color: white; padding: 15px; font-size: 18px; }
        .btn-half { background: #8e44ad; color: white; }
        
        .ping-status { font-size: 11px; color: #bdc3c7; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="admin-panel">
    <h2>⚽ Управление на излъчването</h2>

    <!-- Имена на отбори -->
    <div class="setup-section">
        <input type="text" id="hNameInp" placeholder="Домакин" maxlength="21">
        <input type="text" id="aNameInp" placeholder="Гост" maxlength="21">
        <button class="btn" style="width: auto; background: #2c3e50; color: white;" onclick="updateMatch()">OK</button>
    </div>

    <div class="game-controls">
        <!-- Контроли Домакин -->
        <div class="team-card home">
            <div id="hNameDisp" style="font-weight:bold; margin-bottom:10px;">HOME</div>
            <div id="hScoreDisp" class="score-val">0</div>
            <button class="btn btn-plus" onclick="modScore('home', 1)">+ ГОЛ</button>
            <button class="btn btn-minus" onclick="modScore('home', -1)">Корекция -1</button>
            <div class="card-counter">
                <button class="btn btn-red-plus" onclick="modCards('home', 1)">🟥 +1</button>
                <button class="btn btn-red-minus" onclick="modCards('home', -1)">-1</button>
            </div>
            <div id="hCardsList" style="margin-top:5px;"></div>
        </div>

        <!-- Контроли Гост -->
        <div class="team-card away">
            <div id="aNameDisp" style="font-weight:bold; margin-bottom:10px;">AWAY</div>
            <div id="aScoreDisp" class="score-val">0</div>
            <button class="btn btn-plus" onclick="modScore('away', 1)">+ ГОЛ</button>
            <button class="btn btn-minus" onclick="modScore('away', -1)">Корекция -1</button>
            <div class="card-counter">
                <button class="btn btn-red-plus" onclick="modCards('away', 1)">🟥 +1</button>
                <button class="btn btn-red-minus" onclick="modCards('away', -1)">-1</button>
            </div>
            <div id="aCardsList" style="margin-top:5px;"></div>
        </div>
    </div>

    <!-- Време и Полувремена -->
    <div class="timer-section">
        <div class="label">ВРЕМЕ СЪРВЪР</div>
        <div id="timerDisp" class="timer-val">00:00</div>
        <div class="timer-btns">
            <button id="startBtn" class="btn btn-timer" onclick="toggleTimer()">СТАРТ / ПАУЗА</button>
            <button class="btn btn-half" onclick="setSecondHalf()">45:00 (2-ро полувреме)</button>
            <button class="btn btn-minus" style="background:#c0392b" onclick="resetAll()">RESET МАЧ</button>
            <button class="btn btn-half" style="background:#7f8c8d" onclick="setFirstHalfEnd()">КРАЙ 1-во (45:00)</button>
        </div>
        <div id="pingText" class="ping-status">Ping сървър: Активен</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let data = {
        homeName: "HOME", awayName: "AWAY",
        home: 0, away: 0,
        homeRedCards: 0, awayRedCards: 0,
        seconds: 0, isRunning: false
    };

    // Функция за постоянно "буден" сървър
    setInterval(() => {
        socket.emit('ping', { time: Date.now() });
        document.getElementById('pingText').innerText = "Ping сървър: " + new Date().toLocaleTimeString();
    }, 30000); // на всеки 30 секунди

    function updateMatch() {
        data.homeName = document.getElementById('hNameInp').value || "HOME";
        data.awayName = document.getElementById('aNameInp').value || "AWAY";
        sync();
    }

    function modScore(team, val) {
        data[team] = Math.max(0, data[team] + val);
        sync();
    }

    function modCards(team, val) {
        let key = team + "RedCards";
        data[key] = Math.max(0, data[key] + val);
        sync();
    }

    function toggleTimer() {
        data.isRunning = !data.isRunning;
        sync();
    }

    function setSecondHalf() {
        data.seconds = 2700; // 45 * 60
        sync();
    }

    function setFirstHalfEnd() {
        data.seconds = 2700;
        data.isRunning = false;
        sync();
    }

    function resetAll() {
        if(confirm("Сигурни ли сте, че искате да нулирате всичко?")) {
            data = { homeName: "HOME", awayName: "AWAY", home: 0, away: 0, homeRedCards: 0, awayRedCards: 0, seconds: 0, isRunning: false };
            sync();
            location.reload();
        }
    }

    function sync() {
        socket.emit('update', data);
        updateUI();
    }

    function updateUI() {
        document.getElementById('hNameDisp').innerText = data.homeName;
        document.getElementById('aNameDisp').innerText = data.awayName;
        document.getElementById('hScoreDisp').innerText = data.home;
        document.getElementById('aScoreDisp').innerText = data.away;
        
        // Визуализация на картони в админа
        renderCards('hCardsList', data.homeRedCards);
        renderCards('aCardsList', data.awayRedCards);

        const mins = Math.floor(data.seconds / 60).toString().padStart(2, '0');
        const secs = (data.seconds % 60).toString().padStart(2, '0');
        document.getElementById('timerDisp').innerText = `${mins}:${secs}`;
        document.getElementById('startBtn').innerText = data.isRunning ? "ПАУЗА" : "СТАРТ";
        document.getElementById('startBtn').style.background = data.isRunning ? "#e67e22" : "#2ecc71";
    }

    function renderCards(id, count) {
        const container = document.getElementById(id);
        container.innerHTML = '';
        for(let i=0; i<count; i++) {
            const card = document.createElement('div');
            card.className = 'card-mini';
            card.style.margin = "0 2px";
            container.appendChild(card);
        }
    }

    socket.on('update', (serverData) => {
        data = serverData;
        updateUI();
    });
</script>
</body>
</html>
