<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панел - PRISM Live Edition</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: auto; }
        .section { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .section-title { font-size: 0.9em; color: #888; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        #live-clock { font-size: 3.5em; margin: 5px 0; font-family: monospace; color: #00ff00; }
        .team-config { display: flex; gap: 10px; justify-content: center; }
        .team-input-group { flex: 1; padding: 10px; border-radius: 5px; transition: 0.3s; }
        input[type="text"] { width: 80%; padding: 8px; border: none; border-radius: 4px; font-weight: bold; text-align: center; }
        .score-grid { display: flex; justify-content: space-around; align-items: center; }
        .score-box { font-size: 4em; font-weight: bold; margin: 10px 0; }
        button { padding: 10px 15px; font-size: 1em; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
        .btn-main { background: #444; color: white; }
        .btn-green { background: #28a745; color: white; }
        .btn-red { background: #dc3545; color: white; }
        .btn-orange { background: #fd7e14; color: white; }
        .btn-sync { background: #007bff; color: white; width: 100%; font-size: 1.2em; padding: 20px; }
        .controls { display: flex; justify-content: center; gap: 5px; align-items: center; }
        .card-count { font-size: 1.2em; background: #900; padding: 2px 10px; border-radius: 3px; }
        input[type="number"] { width: 60px; padding: 8px; background: #333; color: white; border: 1px solid #555; }
        .status { font-size: 0.8em; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="section">
        <div class="section-title">Време и Контрол</div>
        <div id="live-clock">00:00</div>
        <div class="controls">
            <button onclick="timer('start')" class="btn-green">СТАРТ</button>
            <button onclick="timer('pause')" class="btn-main">ПАУЗА</button>
            <button onclick="timer('reset')" class="btn-red">НУЛИРАЙ</button>
        </div>
        <div style="margin-top: 15px;">
            <input type="number" id="setMins" value="45">
            <button onclick="setManualTime()" class="btn-main">Задай мин.</button>
            <button onclick="setHalfTime()" class="btn-orange">Второ полувреме (45')</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Настройка на Отбори</div>
        <div class="team-config">
            <div id="hGroup" class="team-input-group">
                <input type="text" id="hNameInput" placeholder="Домакин" oninput="updateEverything()">
                <br><input type="color" id="hColorInput" value="#ff0000" onchange="updateEverything()" style="margin-top:5px">
            </div>
            <div id="aGroup" class="team-input-group">
                <input type="text" id="aNameInput" placeholder="Гост" oninput="updateEverything()">
                <br><input type="color" id="aColorInput" value="#0000ff" onchange="updateEverything()" style="margin-top:5px">
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Резултат и Червени картони</div>
        <div class="score-grid">
            <div style="text-align:center">
                <div id="hDisplay" class="score-box">0</div>
                <button onclick="change(1, 0)" class="btn-green" style="font-size:1.5em">+ ГОЛ</button>
                <button onclick="change(-1, 0)" class="btn-main">-</button>
                <div style="margin-top:15px">
                    <span class="card-count" id="hRedDisplay">0</span><br>
                    <button onclick="changeRed('home', 1)" class="btn-red" style="margin-top:5px">+ КАРТОН</button>
                    <button onclick="changeRed('home', -1)" class="btn-main">-</button>
                </div>
            </div>
            <div style="font-size: 2em; color: #444;">VS</div>
            <div style="text-align:center">
                <div id="aDisplay" class="score-box">0</div>
                <button onclick="change(0, 1)" class="btn-green" style="font-size:1.5em">+ ГОЛ</button>
                <button onclick="change(0, -1)" class="btn-main">-</button>
                <div style="margin-top:15px">
                    <span class="card-count" id="aRedDisplay">0</span><br>
                    <button onclick="changeRed('away', 1)" class="btn-red" style="margin-top:5px">+ КАРТОН</button>
                    <button onclick="changeRed('away', -1)" class="btn-main">-</button>
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="status">
            Статус: <span id="statusDot" style="width:10px;height:10px;display:inline-block;border-radius:50%"></span> 
            <span id="statusText">ПРОВЕРКА...</span>
        </div>
        <button onclick="updateEverything()" class="btn-sync">СИНХРОНИЗИРАЙ ВСИЧКО (Force Sync)</button>
        <p id="reloadingText" style="color:orange; display:none">Връзката прекъсна! Опит за рестарт...</p>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let s = { home: 0, away: 0, homeRedCards: 0, awayRedCards: 0 };

    function getContrastYIQ(hexcolor){
        hexcolor = hexcolor.replace("#", "");
        var r = parseInt(hexcolor.substr(0,2),16);
        var g = parseInt(hexcolor.substr(2,2),16);
        var b = parseInt(hexcolor.substr(4,2),16);
        var yiq = ((r*299)+(g*587)+(b*114))/1000;
        return (yiq >= 128) ? 'black' : 'white';
    }

    function formatAdminTime(totalSeconds) {
        const mins = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
        const secs = (totalSeconds % 60).toString().padStart(2, '0');
        return `${mins}:${secs}`;
    }

    socket.on('timerUpdate', (data) => {
        const seconds = (typeof data === 'object') ? data.seconds : data;
        document.getElementById('live-clock').innerText = formatAdminTime(seconds);
    });

    socket.on('connect', () => {
        document.getElementById('statusDot').style.backgroundColor = '#28a745';
        document.getElementById('statusText').innerText = 'ONLINE';
        document.getElementById('reloadingText').style.display = 'none';
    });

    socket.on('disconnect', () => {
        document.getElementById('statusDot').style.backgroundColor = '#dc3545';
        document.getElementById('statusText').innerText = 'OFFLINE';
        document.getElementById('reloadingText').style.display = 'block';
    });

    socket.on('update', (data) => { 
        s = {...s, ...data};
        document.getElementById('hDisplay').innerText = s.home;
        document.getElementById('aDisplay').innerText = s.away;
        document.getElementById('hRedDisplay').innerText = s.homeRedCards;
        document.getElementById('aRedDisplay').innerText = s.awayRedCards;
        
        if(data.homeName) document.getElementById('hNameInput').value = data.homeName;
        if(data.awayName) document.getElementById('aNameInput').value = data.awayName;
        if(data.homeColor) document.getElementById('hColorInput').value = data.homeColor;
        if(data.awayColor) document.getElementById('aColorInput').value = data.awayColor;
        
        applyColors();
        saveLocal();
    });

    function applyColors() {
        const hCol = document.getElementById('hColorInput').value;
        const aCol = document.getElementById('aColorInput').value;
        document.getElementById('hGroup').style.backgroundColor = hCol;
        document.getElementById('aGroup').style.backgroundColor = aCol;
        document.getElementById('hNameInput').style.color = getContrastYIQ(hCol);
        document.getElementById('aNameInput').style.color = getContrastYIQ(aCol);
        document.getElementById('hNameInput').style.backgroundColor = 'transparent';
        document.getElementById('aNameInput').style.backgroundColor = 'transparent';
    }

    function change(h, a) {
        s.home = Math.max(0, s.home + h);
        s.away = Math.max(0, s.away + a);
        socket.emit('changeScore', { home: s.home, away: s.away });
    }

    function changeRed(team, val) {
        if (team === 'home') s.homeRedCards = Math.max(0, s.homeRedCards + val);
        else s.awayRedCards = Math.max(0, s.awayRedCards + val);
        socket.emit('changeScore', { homeRedCards: s.homeRedCards, awayRedCards: s.awayRedCards });
    }

    function timer(cmd) { socket.emit('controlTimer', cmd); }
    function setManualTime() { socket.emit('setManualTime', document.getElementById('setMins').value); }
    function setHalfTime() { socket.emit('setManualTime', 45); }

    function updateEverything() {
        applyColors();
        socket.emit('changeScore', {
            homeName: document.getElementById('hNameInput').value,
            awayName: document.getElementById('aNameInput').value,
            homeColor: document.getElementById('hColorInput').value,
            awayColor: document.getElementById('aColorInput').value,
            home: s.home, away: s.away,
            homeRedCards: s.homeRedCards, awayRedCards: s.awayRedCards
        });
        saveLocal();
    }

    function saveLocal() {
        const data = {
            hn: document.getElementById('hNameInput').value,
            an: document.getElementById('aNameInput').value,
            hc: document.getElementById('hColorInput').value,
            ac: document.getElementById('aColorInput').value
        };
        localStorage.setItem('sb_cache', JSON.stringify(data));
    }

    window.onload = () => {
        const cache = JSON.parse(localStorage.getItem('sb_cache'));
        if(cache) {
            document.getElementById('hNameInput').value = cache.hn;
            document.getElementById('aNameInput').value = cache.an;
            document.getElementById('hColorInput').value = cache.hc;
            document.getElementById('aColorInput').value = cache.ac;
        }
        applyColors();
    };
</script>
</body>
</html>
