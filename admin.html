<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панел - Scoreboard</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .panel { background: #2a2a2a; padding: 20px; border-radius: 10px; display: inline-block; min-width: 300px; }
        .status { margin-bottom: 20px; font-size: 0.8em; }
        #statusDot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; background: #dc3545; }
        .score-box { font-size: 3em; margin: 10px; }
        button { padding: 10px 20px; font-size: 1em; cursor: pointer; margin: 5px; border-radius: 5px; border: none; }
        .btn-green { background: #28a745; color: white; }
        .btn-red { background: #dc3545; color: white; }
        input { padding: 8px; margin: 5px; width: 150px; border-radius: 5px; border: 1px solid #444; }
        #reloadingText { color: #ffc107; display: none; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="status">
            <span id="statusDot"></span> <span id="statusText">OFFLINE</span>
            <div id="reloadingText">Връзката прекъсна! Презареждане...</div>
        </div>

        <h1 id="live-clock">00:00</h1>
        
        <div>
            <button onclick="timer('start')" class="btn-green">START</button>
            <button onclick="timer('pause')">PAUSE</button>
            <button onclick="timer('reset')" class="btn-red">RESET</button>
        </div>

        <hr>

        <div style="display: flex; justify-content: space-around;">
            <div>
                <input type="text" id="hNameInput" placeholder="Домакин" onchange="updateEverything()">
                <div id="hDisplay" class="score-box">0</div>
                <button onclick="change(1, 0)" class="btn-green">+ ГОЛ</button>
                <button onclick="change(-1, 0)">-</button>
                <p>Червени картони: <span id="hRedDisplay">0</span></p>
                <button onclick="changeRed('home', 1)" class="btn-red">+ Картон</button>
            </div>
            <div>
                <input type="text" id="aNameInput" placeholder="Гост" onchange="updateEverything()">
                <div id="aDisplay" class="score-box">0</div>
                <button onclick="change(0, 1)" class="btn-green">+ ГОЛ</button>
                <button onclick="change(0, -1)">-</button>
                <p>Червени картони: <span id="aRedDisplay">0</span></p>
                <button onclick="changeRed('away', 1)" class="btn-red">+ Картон</button>
            </div>
        </div>

        <hr>
        
        <p>Настройки на времето (минути):</p>
        <input type="number" id="setMins" placeholder="45">
        <button onclick="setManualTime()">Задай време</button>

        <p>Цветове:</p>
        <input type="color" id="hColorInput" value="#ff0000" onchange="updateEverything()">
        <input type="color" id="aColorInput" value="#0000ff" onchange="updateEverything()">
    </div>

    <!-- Твоят JS скрипт -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let s = { home: 0, away: 0, homeRedCards: 0, awayRedCards: 0 };
        let reloadTimer = null;

        function formatAdminTime(totalSeconds) {
            if (totalSeconds === undefined || totalSeconds === null || isNaN(totalSeconds)) return "00:00";
            const mins = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const secs = (totalSeconds % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }

        socket.on('timerUpdate', (data) => {
            const seconds = (typeof data === 'object') ? data.seconds : data;
            const timerEl = document.getElementById('live-clock');
            if (timerEl) timerEl.innerText = formatAdminTime(seconds);
        });

        socket.on('connect', () => {
            clearTimeout(reloadTimer);
            document.getElementById('statusDot').style.backgroundColor = '#28a745';
            document.getElementById('statusText').innerText = 'ONLINE';
            document.getElementById('reloadingText').style.display = 'none';
        });

        socket.on('disconnect', () => {
            document.getElementById('statusDot').style.backgroundColor = '#dc3545';
            document.getElementById('statusText').innerText = 'OFFLINE';
            document.getElementById('reloadingText').style.display = 'block';
            reloadTimer = setTimeout(() => { location.reload(); }, 10000);
        });

        socket.on('update', (data) => { 
            s.home = data.home || 0;
            s.away = data.away || 0;
            s.homeRedCards = data.homeRedCards || 0;
            s.awayRedCards = data.awayRedCards || 0;
            
            document.getElementById('hDisplay').innerText = s.home;
            document.getElementById('aDisplay').innerText = s.away;
            document.getElementById('hRedDisplay').innerText = s.homeRedCards;
            document.getElementById('aRedDisplay').innerText = s.awayRedCards;
            
            if (data.seconds !== undefined) {
                document.getElementById('live-clock').innerText = formatAdminTime(data.seconds);
            }
            saveToLocal();
        });

        function change(h, a) {
            s.home = Math.max(0, s.home + h);
            s.away = Math.max(0, s.away + a);
            socket.emit('changeScore', { home: s.home, away: s.away });
        }

        function changeRed(team, val) {
            if (team === 'home') s.homeRedCards = Math.max(0, s.homeRedCards + val);
            else s.awayRedCards = Math.max(0, s.awayRedCards + val);
            socket.emit('changeScore', { homeRedCards: s.homeRedCards, awayRedCards: s.awayRedCards });
        }

        function timer(cmd) {
            socket.emit('controlTimer', cmd);
        }

        function setManualTime() {
            const mins = document.getElementById('setMins').value;
            if (mins !== "") socket.emit('setManualTime', mins);
        }

        function updateEverything() {
            const data = {
                homeName: document.getElementById('hNameInput').value,
                awayName: document.getElementById('aNameInput').value,
                homeColor: document.getElementById('hColorInput').value,
                awayColor: document.getElementById('aColorInput').value,
                home: s.home,
                away: s.away,
                homeRedCards: s.homeRedCards,
                awayRedCards: s.awayRedCards
            };
            socket.emit('changeScore', data);
        }

        function saveToLocal() {
            const dataToSave = {
                hName: document.getElementById('hNameInput').value,
                aName: document.getElementById('aNameInput').value,
                hColor: document.getElementById('hColorInput').value,
                aColor: document.getElementById('aColorInput').value,
                home: s.home,
                away: s.away,
                homeRedCards: s.homeRedCards,
                awayRedCards: s.awayRedCards
            };
            localStorage.setItem('scoreboardCache', JSON.stringify(dataToSave));
        }

        window.onload = function() {
            const saved = localStorage.getItem('scoreboardCache');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('hNameInput').value = data.hName || "";
                document.getElementById('aNameInput').value = data.aName || "";
                document.getElementById('hColorInput').value = data.hColor || "#ff0000";
                document.getElementById('aColorInput').value = data.aColor || "#0000ff";
                s.home = data.home || 0;
                s.away = data.away || 0;
                s.homeRedCards = data.homeRedCards || 0;
                s.awayRedCards = data.awayRedCards || 0;
            }
        };
    </script>
</body>
</html>
