<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Контролен панел - Футболно Табло</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .admin-panel { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        .flex-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
        
        .team-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .control-box { text-align: center; background: #fafafa; padding: 15px; border-radius: 8px; }
        
        button { cursor: pointer; border: none; border-radius: 4px; padding: 10px 15px; font-weight: bold; transition: opacity 0.2s; }
        .btn-plus { background: #27ae60; color: white; width: 100%; margin-bottom: 5px; font-size: 18px; }
        .btn-minus { background: #e67e22; color: white; width: 100%; }
        .btn-red { background: #e74c3c; color: white; margin-top: 10px; width: 100%; }
        .btn-reset { background: #7f8c8d; color: white; }
        .btn-timer { background: #3498db; color: white; font-size: 18px; padding: 15px; flex: 1; }
        
        .score-display { font-size: 32px; font-weight: bold; margin: 10px 0; color: #2c3e50; }
        .label { font-size: 12px; color: #7f8c8d; text-transform: uppercase; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="admin-panel">
    <h2>🏆 Управление на мача</h2>

    <!-- Настройка на имена -->
    <div class="section">
        <div class="flex-row">
            <input type="text" id="homeInput" placeholder="Домакин (макс 21)" maxlength="21">
            <span>VS</span>
            <input type="text" id="awayInput" placeholder="Гост (макс 21)" maxlength="21">
        </div>
        <button onclick="updateNames()" style="width:100%; background:#2c3e50; color:white;">ОБНОВИ ИМЕНАТА</button>
    </div>

    <!-- Резултат и Картони -->
    <div class="team-controls">
        <!-- Домакин -->
        <div class="control-box">
            <span class="label">Домакин</span>
            <div id="homeScoreDisp" class="score-display">0</div>
            <button class="btn-plus" onclick="changeScore('home', 1)">+ ГОЛ</button>
            <button class="btn-minus" onclick="changeScore('home', -1)">- 1</button>
            <button class="btn-red" onclick="changeRedCard('home', 1)">🟥 ЧЕРВЕН КАРТОН</button>
        </div>

        <!-- Гост -->
        <div class="control-box">
            <span class="label">Гост</span>
            <div id="awayScoreDisp" class="score-display">0</div>
            <button class="btn-plus" onclick="changeScore('away', 1)">+ ГОЛ</button>
            <button class="btn-minus" onclick="changeScore('away', -1)">- 1</button>
            <button class="btn-red" onclick="changeRedCard('away', 1)">🟥 ЧЕРВЕН КАРТОН</button>
        </div>
    </div>

    <!-- Таймер Контрол -->
    <div class="section" style="margin-top:20px;">
        <span class="label">Време: <span id="timerDisp" style="font-weight:bold;">00:00</span></span>
        <div class="flex-row">
            <button id="timerBtn" class="btn-timer" onclick="toggleTimer()">СТАРТ</button>
            <button class="btn-reset" onclick="resetMatch()">RESET</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let matchData = {
        homeName: "HOME",
        awayName: "AWAY",
        home: 0,
        away: 0,
        homeRedCards: 0,
        awayRedCards: 0,
        seconds: 0,
        isRunning: false
    };

    function updateNames() {
        matchData.homeName = document.getElementById('homeInput').value || "HOME";
        matchData.awayName = document.getElementById('awayInput').value || "AWAY";
        sendUpdate();
    }

    function changeScore(team, val) {
        matchData[team] = Math.max(0, matchData[team] + val);
        document.getElementById(`${team}ScoreDisp`).innerText = matchData[team];
        sendUpdate();
    }

    function changeRedCard(team, val) {
        matchData[`${team}RedCards`] = Math.max(0, matchData[`${team}RedCards`] + val);
        sendUpdate();
    }

    function toggleTimer() {
        matchData.isRunning = !matchData.isRunning;
        document.getElementById('timerBtn').innerText = matchData.isRunning ? "ПАУЗА" : "СТАРТ";
        document.getElementById('timerBtn').style.background = matchData.isRunning ? "#e67e22" : "#3498db";
        sendUpdate();
    }

    function resetMatch() {
        if(confirm("Нулиране на мача?")) {
            matchData = { homeName: "HOME", awayName: "AWAY", home: 0, away: 0, homeRedCards: 0, awayRedCards: 0, seconds: 0, isRunning: false };
            location.reload();
            sendUpdate();
        }
    }

    function sendUpdate() {
        socket.emit('update', matchData);
    }

    // Слушаме за времето от сървъра, за да го показваме и в админа
    socket.on('update', (data) => {
        const mins = Math.floor(data.seconds / 60).toString().padStart(2, '0');
        const secs = (data.seconds % 60).toString().padStart(2, '0');
        document.getElementById('timerDisp').innerText = `${mins}:${secs}`;
    });
</script>
</body>
</html>
