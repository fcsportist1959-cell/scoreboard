    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let s = { home: 0, away: 0, homeRedCards: 0, awayRedCards: 0 };
        let reloadTimer = null;

        // Помощна функция за форматиране на времето
        function formatAdminTime(totalSeconds) {
            if (isNaN(totalSeconds)) return "00:00";
            const mins = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const secs = (totalSeconds % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }

        // СЛУШАТЕЛ ЗА ЧАСОВНИКА (Обновява само цифрите горе)
        socket.on('timerUpdate', (data) => {
            const seconds = (typeof data === 'object') ? data.seconds : data;
            document.getElementById('live-clock').innerText = formatAdminTime(seconds);
        });

        socket.on('connect', () => {
            clearTimeout(reloadTimer);
            document.getElementById('statusDot').style.backgroundColor = '#28a745';
            document.getElementById('statusText').innerText = 'ONLINE';
            document.getElementById('reloadingText').style.display = 'none';
        });

        socket.on('disconnect', () => {
            document.getElementById('statusDot').style.backgroundColor = '#dc3545';
            document.getElementById('statusText').innerText = 'OFFLINE';
            document.getElementById('reloadingText').style.display = 'block';
            reloadTimer = setTimeout(() => { location.reload(); }, 10000);
        });

        // ОСНОВЕН ЪПДЕЙТ (Обновява всичко останало)
        socket.on('update', (data) => { 
            s.home = data.home;
            s.away = data.away;
            s.homeRedCards = data.homeRedCards || 0;
            s.awayRedCards = data.awayRedCards || 0;
            
            document.getElementById('hDisplay').innerText = s.home;
            document.getElementById('aDisplay').innerText = s.away;
            document.getElementById('hRedDisplay').innerText = s.homeRedCards;
            document.getElementById('aRedDisplay').innerText = s.awayRedCards;
            
            // Сверяваме и часовника тук, за да не се нулира при промени
            if (data.seconds !== undefined) {
                document.getElementById('live-clock').innerText = formatAdminTime(data.seconds);
            }
            saveToLocal();
        });

        function change(h, a) {
            s.home = Math.max(0, s.home + h);
            s.away = Math.max(0, s.away + a);
            socket.emit('changeScore', { home: s.home, away: s.away });
        }

        function changeRed(team, val) {
            if (team === 'home') s.homeRedCards = Math.max(0, s.homeRedCards + val);
            else s.awayRedCards = Math.max(0, s.awayRedCards + val);
            socket.emit('changeScore', { homeRedCards: s.homeRedCards, awayRedCards: s.awayRedCards });
        }

        function timer(cmd) {
            socket.emit('controlTimer', cmd);
        }

        function setManualTime() {
            const mins = document.getElementById('setMins').value;
            if (mins !== "") socket.emit('setManualTime', mins);
        }

        function updateEverything() {
            const data = {
                homeName: document.getElementById('hNameInput').value,
                awayName: document.getElementById('aNameInput').value,
                homeColor: document.getElementById('hColorInput').value,
                awayColor: document.getElementById('aColorInput').value,
                home: s.home,
                away: s.away,
                homeRedCards: s.homeRedCards,
                awayRedCards: s.awayRedCards
            };
            socket.emit('changeScore', data);
        }

        function saveToLocal() {
            const dataToSave = {
                hName: document.getElementById('hNameInput').value,
                aName: document.getElementById('aNameInput').value,
                hColor: document.getElementById('hColorInput').value,
                aColor: document.getElementById('aColorInput').value,
                home: s.home,
                away: s.away,
                homeRedCards: s.homeRedCards,
                awayRedCards: s.awayRedCards
            };
            localStorage.setItem('scoreboardCache', JSON.stringify(dataToSave));
        }

        window.onload = function() {
            const saved = localStorage.getItem('scoreboardCache');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('hNameInput').value = data.hName || "";
                document.getElementById('aNameInput').value = data.aName || "";
                document.getElementById('hColorInput').value = data.hColor || "#ff0000";
                document.getElementById('aColorInput').value = data.aColor || "#0000ff";
            }
        };
    </script>
</body>
</html>
