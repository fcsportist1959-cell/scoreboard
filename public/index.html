<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Amateur Football Scoreboard PRO</title>
    <style>
        body { margin: 0; padding: 0; background: transparent; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .scoreboard { position: absolute; top: 25px; left: 25px; display: flex; align-items: center; filter: drop-shadow(0 10px 25px rgba(0,0,0,0.85)); z-index: 1000; cursor: grab; }
        .brand-block { background: #1a1a1a; padding: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid #333; border-left: 6px solid #ffcc00; border-radius: 8px 0 0 8px; min-width: 125px; height: 120px; z-index: 2; box-sizing: border-box; }
        .logo-box { width: 100px; height: 70px; background: #ffffff; border-radius: 4px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; padding: 4px; box-sizing: border-box; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .time-display { font-size: 32px; color: #39FF14; font-weight: 900; font-family: 'Courier New', monospace; text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }
        .teams-container { display: flex; flex-direction: column; border: 2px solid #333; border-left: none; border-radius: 0 8px 8px 0; background: #1a1a1a; height: 104px; position: relative; }
        .team-row { display: flex; height: 50px; align-items: center; }
        .team-row:first-child { border-bottom: 2px solid #333; }
        .name-cell { width: 320px; padding: 0 20px; font-family: 'Segoe UI', 'Verdana', 'Arial Black', sans-serif; font-size: 24px; font-weight: 900; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; height: 100%; line-height: 50px; }
        .score-cell { width: 75px; background: rgba(0,0,0,0.95); color: #ffcc00; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 900; height: 100%; border-left: 2px solid #333; }
        .cards-layer { position: absolute; left: 100%; top: 0; height: 100%; display: flex; flex-direction: column; justify-content: center; padding-left: 12px; pointer-events: none; }
        .team-cards { display: flex; gap: 5px; height: 52px; align-items: center; }
        .red-card-icon { width: 16px; height: 24px; background: #ff0000; border: 2px solid #fff; border-radius: 2px; box-shadow: 3px 3px 6px rgba(0,0,0,0.6); animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .goal-flash { animation: flash 0.6s ease-in-out; }
        @keyframes flash { 50% { background: #ffffff !important; color: #000000 !important; } }
    </style>
</head>
<body>
<div id="board" class="scoreboard">
    <div class="brand-block">
        <div class="logo-box"><img id="mainLogo" src="logo.jpg" alt="Logo"></div>
        <div id="timer" class="time-display">00:00</div>
    </div>
    <div class="teams-container">
        <div class="team-row"><div id="hN" class="name-cell">HOME</div><div id="hS" class="score-cell">0</div></div>
        <div class="team-row"><div id="aN" class="name-cell">AWAY</div><div id="aS" class="score-cell">0</div></div>
        <div class="cards-layer">
            <div id="hC" class="team-cards"></div>
            <div id="aC" class="team-cards"></div>
        </div>
    </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let lastH = 0, lastA = 0;

    function getContrast(hex){
        if(!hex) return '#ffffff';
        hex = hex.replace('#','');
        if(hex.length === 3) hex = hex.split('').map(s => s+s).join('');
        const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
        const yiq = ((r*299)+(g*587)+(b*114))/1000;
        return (yiq >= 135) ? '#000000' : '#ffffff';
    }

    socket.on('update', (data) => {
        // ДИНАМИЧНА СМЯНА НА ЛОГОТО С ФИКС ЗА КЕШИРАНЕ
        const logoImg = document.getElementById('mainLogo');
        const newLogoName = data.logoFile && data.logoFile.trim() !== "" ? data.logoFile : 'logo.jpg';
        
        // Проверяваме дали текущият източник съдържа името на новия файл
        // Използваме URL обекта за чисто сравнение на пътищата
        const currentSrc = logoImg.src;
        if (!currentSrc.includes(newLogoName)) {
            // Добавяме уникален параметър ?t=... за да принудим браузъра да зареди файла наново
            logoImg.src = newLogoName + "?t=" + new Date().getTime();
        }

        const hn = document.getElementById('hN'), an = document.getElementById('aN');
        const hs = document.getElementById('hS'), as = document.getElementById('aS');
        hn.innerText = data.homeName; an.innerText = data.awayName;
        hn.style.backgroundColor = data.homeColor || '#333';
        hn.style.color = getContrast(data.homeColor);
        an.style.backgroundColor = data.awayColor || '#444';
        an.style.color = getContrast(data.awayColor);
        
        if(data.home !== lastH) { hs.classList.add('goal-flash'); setTimeout(()=>hs.classList.remove('goal-flash'), 600); lastH = data.home; }
        if(data.away !== lastA) { as.classList.add('goal-flash'); setTimeout(()=>as.classList.remove('goal-flash'), 600); lastA = data.away; }
        
        hs.innerText = data.home; as.innerText = data.away;
        const m = Math.floor(data.seconds / 60).toString().padStart(2, '0');
        const s = (data.seconds % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;
        renderCards('hC', data.homeRedCards);
        renderCards('aC', data.awayRedCards);
    });

    function renderCards(id, count) {
        const container = document.getElementById(id);
        if(container.children.length === count) return;
        container.innerHTML = '';
        for(let i=0; i<count; i++) {
            const card = document.createElement('div');
            card.className = 'red-card-icon';
            container.appendChild(card);
        }
    }

    const board = document.getElementById('board');
    let x=0, y=0, dx=0, dy=0, active=false;
    board.onmousedown = (e) => { active=true; dx=e.clientX-x; dy=e.clientY-y; };
    window.onmousemove = (e) => { if(active){ x=e.clientX-dx; y=e.clientY-dy; board.style.transform=`translate(${x}px,${y}px)`; } };
    window.onmouseup = () => active=false;
</script>
</body>
</html>
