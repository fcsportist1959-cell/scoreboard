<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: transparent; font-family: Arial, Helvetica, sans-serif; overflow: hidden; }
        
        .scoreboard { 
            position: absolute; top: 20px; left: 20px; 
            display: flex; align-items: stretch;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.5));
            z-index: 1000;
        }

        /* Класически правоъгълен блок за Спонсор и Време */
        .brand-block { 
            background: #1a1a1a; 
            padding: 10px 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-left: 5px solid #ffcc00; /* Акцентна лента */
            min-width: 80px;
        }

        .logo-box { 
            width: 70px; height: 70px; 
            background: #ffffff; 
            border-radius: 4px; /* Леко заоблени ъгли за модерност, но без сложни форми */
            display: flex; align-items: center; justify-content: center; margin-bottom: 5px;
        }
        .logo-box img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .time-display { 
            font-size: 22px; color: #ffffff; font-weight: bold; font-family: 'Courier New', Courier, monospace; 
        }

        /* Секция Отбори - един под друг */
        .teams-container { 
            display: flex; flex-direction: column; 
            background: rgba(0, 0, 0, 0.85); 
        }

        .team-row { 
            display: flex; height: 45px; align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        .team-row:last-child { border-bottom: none; }

        .name-cell { 
            width: 260px; padding: 0 15px; 
            font-size: 20px; font-weight: bold; text-transform: uppercase; color: #ffffff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .score-cell { 
            width: 50px; background: #333333; color: #ffcc00; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 26px; font-weight: bold; height: 100%;
        }

        /* Картони под името - за да е чисто */
        .cards-cell { display: flex; gap: 4px; padding: 0 10px; }
        .red-card-icon { width: 10px; height: 14px; background: #ff0000; border-radius: 1px; border: 1px solid white; }

        /* Анимация при гол */
        .goal-flash { animation: flash 0.5s ease-in-out; }
        @keyframes flash { 50% { background: #ffcc00; color: #000; } }
    </style>
</head>
<body>

<div id="board" class="scoreboard">
    <div class="brand-block">
        <div class="logo-box">
            <img src="https://placeholder.com" alt="Sponsor">
        </div>
        <div id="timer" class="time-display">00:00</div>
    </div>
    
    <div class="teams-container">
        <!-- Ред Домакин -->
        <div class="team-row">
            <div id="hN" class="name-cell">ДОМАКИН</div>
            <div id="hS" class="score-cell">0</div>
            <div id="hC" class="cards-cell"></div>
        </div>
        <!-- Ред Гост -->
        <div class="team-row">
            <div id="aN" class="name-cell">ГОСТ</div>
            <div id="aS" class="score-cell">0</div>
            <div id="aC" class="cards-cell"></div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let lastH = 0, lastA = 0;

    // Функция за контраст на текста спрямо цвета на фона
    function getContrast(hex){
        if(!hex) return '#ffffff';
        hex = hex.replace('#','');
        const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
        return ((r*299)+(g*587)+(b*114))/1000 >= 128 ? '#000000' : '#ffffff';
    }

    socket.on('update', (data) => {
        // Имена и Цветове
        const hn = document.getElementById('hN'), an = document.getElementById('aN');
        hn.innerText = data.homeName; an.innerText = data.awayName;
        hn.style.backgroundColor = data.homeColor || '#000000';
        hn.style.color = getContrast(data.homeColor);
        an.style.backgroundColor = data.awayColor || '#000000';
        an.style.color = getContrast(data.awayColor);

        // Резултат
        const hs = document.getElementById('hS'), as = document.getElementById('aS');
        if(data.home !== lastH) { hs.classList.add('goal-flash'); setTimeout(()=>hs.classList.remove('goal-flash'), 500); lastH = data.home; }
        if(data.away !== lastA) { as.classList.add('goal-flash'); setTimeout(()=>as.classList.remove('goal-flash'), 500); lastA = data.away; }
        hs.innerText = data.home; as.innerText = data.away;

        // Време
        const m = Math.floor(data.seconds / 60).toString().padStart(2, '0');
        const s = (data.seconds % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;

        // Картони
        renderCards('hC', data.homeRedCards);
        renderCards('aC', data.awayRedCards);
    });

    function renderCards(id, count) {
        const container = document.getElementById(id);
        container.innerHTML = '';
        for(let i=0; i<count; i++) {
            const card = document.createElement('div');
            card.className = 'red-card-icon';
            container.appendChild(card);
        }
    }
</script>
</body>
</html>
