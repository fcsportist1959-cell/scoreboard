<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        
        .scoreboard { 
            position: absolute; top: 25px; left: 25px; 
            display: flex; align-items: stretch;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.8));
            z-index: 1000;
            cursor: grab;
        }

        /* Блок Лого и Таймер - Отделен */
        .brand-block { 
            background: #1a1a1a; 
            padding: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid #333;
            border-left: 6px solid #ffcc00;
            border-radius: 8px 0 0 8px;
            min-width: 120px;
            margin-right: 2px; /* Малко разстояние, за да не са "залепени" */
        }

        .logo-box { 
            width: 110px; height: 75px; 
            background: #ffffff; 
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
            padding: 5px;
        }
        
        .logo-box img { max-width: 90%; max-height: 90%; object-fit: contain; }

        /* Неоново зелено за видимост на слънце */
        .time-display { 
            font-size: 30px; color: #39FF14; font-weight: 900; 
            font-family: 'Courier New', monospace; 
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }

        /* Контейнер Отбори - с контур */
        .teams-container { 
            display: flex; flex-direction: column; 
            border: 2px solid #333;
            border-radius: 0 8px 8px 0;
            overflow: hidden;
            background: #1a1a1a;
        }

        .team-row { 
            display: flex; height: 60px; align-items: center; 
            position: relative;
        }

        /* Тънка разделителна линия само по средата */
        .team-row:first-child {
            border-bottom: 1px solid rgba(0,0,0,0.4);
        }

        .name-cell { 
            width: 340px; padding: 0 25px; 
            font-family: Arial, sans-serif; 
            font-size: 28px; font-weight: 900; text-transform: uppercase;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            height: 100%; line-height: 60px;
        }

        .score-cell { 
            width: 80px; background: rgba(0,0,0,0.9); color: #ffcc00; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 40px; font-weight: 900; height: 100%;
            border-left: 2px solid #333;
        }

        /* КАРТОНИ - Появяват се отстрани (външни) */
        .cards-container {
            position: absolute;
            left: 100%; /* Веднага след края на таблото */
            top: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding-left: 10px;
            pointer-events: none;
        }

        .team-cards { display: flex; gap: 5px; height: 60px; align-items: center; }

        .red-card-icon { 
            width: 18px; height: 26px; 
            background: #ff0000; border: 2px solid #fff; border-radius: 3px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .goal-flash { animation: flash 0.6s ease-in-out; }
        @keyframes flash { 50% { background: #ffffff !important; color: #000000 !important; } }
    </style>
</head>
<body>

<div id="board" class="scoreboard">
    <!-- Блок 1: Спонсор и Време -->
    <div class="brand-block">
        <div class="logo-box">
            <img src="logo.jpg" alt="Logo">
        </div>
        <div id="timer" class="time-display">00:00</div>
    </div>
    
    <!-- Блок 2: Отбори -->
    <div class="teams-container">
        <div class="team-row">
            <div id="hN" class="name-cell">HOME</div>
            <div id="hS" class="score-cell">0</div>
        </div>
        <div class="team-row">
            <div id="aN" class="name-cell">AWAY</div>
            <div id="aS" class="score-cell">0</div>
        </div>

        <!-- Слой за картоните (външен) -->
        <div class="cards-container">
            <div id="hC" class="team-cards"></div>
            <div id="aC" class="team-cards"></div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let lastH = 0, lastA = 0;

    function getContrast(hex){
        if(!hex) return '#ffffff';
        hex = hex.replace('#','');
        if(hex.length === 3) hex = hex.split('').map(s => s+s).join('');
        const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
        const yiq = ((r*299)+(g*587)+(b*114))/1000;
        return (yiq >= 135) ? '#000000' : '#ffffff';
    }

    socket.on('update', (data) => {
        const hn = document.getElementById('hN'), an = document.getElementById('aN');
        const hs = document.getElementById('hS'), as = document.getElementById('aS');

        hn.innerText = data.homeName;
        an.innerText = data.awayName;
        hn.style.backgroundColor = data.homeColor || '#333';
        hn.style.color = getContrast(data.homeColor);
        an.style.backgroundColor = data.awayColor || '#444';
        an.style.color = getContrast(data.awayColor);

        if(data.home !== lastH) { hs.classList.add('goal-flash'); setTimeout(()=>hs.classList.remove('goal-flash'), 600); lastH = data.home; }
        if(data.away !== lastA) { as.classList.add('goal-flash'); setTimeout(()=>as.classList.remove('goal-flash'), 600); lastA = data.away; }
        
        hs.innerText = data.home;
        as.innerText = data.away;

        const m = Math.floor(data.seconds / 60).toString().padStart(2, '0');
        const s = (data.seconds % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;

        renderCards('hC', data.homeRedCards);
        renderCards('aC', data.awayRedCards);
    });

    function renderCards(id, count) {
        const container = document.getElementById(id);
        if(container.children.length === count) return; // Оптимизация
        container.innerHTML = '';
        for(let i=0; i<count; i++) {
            const card = document.createElement('div');
            card.className = 'red-card-icon';
            container.appendChild(card);
        }
    }

    // Drag and Drop логика
    const board = document.getElementById('board');
    let x=0, y=0, dx=0, dy=0, active=false;
    board.onmousedown = (e) => { active=true; dx=e.clientX-x; dy=e.clientY-y; };
    window.onmousemove = (e) => { if(active){ x=e.clientX-dx; y=e.clientY-dy; board.style.transform=`translate(${x}px,${y}px)`; } };
    window.onmouseup = () => active=false;
</script>
</body>
</html>
