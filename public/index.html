<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        
        .scoreboard { 
            position: absolute; top: 25px; left: 25px; 
            display: flex; align-items: stretch;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.7));
            z-index: 1000;
            cursor: grab;
        }

        /* Блок за Спонсор и Таймер */
        .brand-block { 
            background: #1a1a1a; 
            padding: 15px 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-left: 6px solid #ffcc00;
            border-radius: 8px 0 0 8px;
            min-width: 110px;
        }

        .logo-box { 
            width: 100px; height: 70px; /* Коригирано за правоъгълното лого на КФМ */
            background: #ffffff; 
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
            padding: 5px;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.1);
        }
        
        /* Пътят е към logo.jpg */
        .logo-box img { 
            max-width: 95%; 
            max-height: 95%; 
            object-fit: contain; 
        }

        .time-display { 
            font-size: 28px; color: #ffffff; font-weight: 900; 
            font-family: 'Courier New', monospace; 
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
        }

        /* Секция Отбори */
        .teams-container { 
            display: flex; flex-direction: column; 
            overflow: hidden;
            border-radius: 0 8px 8px 0;
        }

        .team-row { display: flex; height: 55px; align-items: center; }

        .name-cell { 
            width: 330px; padding: 0 25px; 
            font-size: 26px; font-weight: 900; text-transform: uppercase;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            height: 100%; line-height: 55px;
        }

        .score-cell { 
            width: 70px; background: rgba(0,0,0,0.95); color: #ffcc00; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 36px; font-weight: 900; height: 100%;
            border-left: 1px solid rgba(255,255,255,0.2);
        }

        .cards-cell { display: flex; gap: 5px; padding: 0 12px; }
        .red-card-icon { 
            width: 15px; height: 22px; 
            background: #ff0000; border-radius: 2px; border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .goal-flash { animation: flash 0.6s ease-in-out; }
        @keyframes flash { 50% { background: #ffffff !important; color: #000000 !important; } }
    </style>
</head>
<body>

<div id="board" class="scoreboard">
    <div class="brand-block">
        <div class="logo-box">
            <!-- Променено на logo.jpg -->
            <img src="/logo.jpg" alt="KFM Logo" onerror="console.log('Logo load error');">
        </div>
        <div id="timer" class="time-display">00:00</div>
    </div>
    
    <div class="teams-container">
        <div class="team-row">
            <div id="hN" class="name-cell">HOME</div>
            <div id="hS" class="score-cell">0</div>
            <div id="hC" class="cards-cell"></div>
        </div>
        <div class="team-row">
            <div id="aN" class="name-cell">AWAY</div>
            <div id="aS" class="score-cell">0</div>
            <div id="aC" class="cards-cell"></div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let lastH = 0, lastA = 0;

    function getContrast(hex){
        if(!hex) return '#ffffff';
        hex = hex.replace('#','');
        if(hex.length === 3) hex = hex.split('').map(s => s+s).join('');
        const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
        const yiq = ((r*299)+(g*587)+(b*114))/1000;
        return (yiq >= 128) ? '#000000' : '#ffffff';
    }

    socket.on('update', (data) => {
        const hn = document.getElementById('hN'), an = document.getElementById('aN');
        const hs = document.getElementById('hS'), as = document.getElementById('aS');

        hn.innerText = data.homeName;
        an.innerText = data.awayName;
        hn.style.backgroundColor = data.homeColor || '#333';
        hn.style.color = getContrast(data.homeColor);
        an.style.backgroundColor = data.awayColor || '#444';
        an.style.color = getContrast(data.awayColor);

        if(data.home !== lastH) { hs.classList.add('goal-flash'); setTimeout(()=>hs.classList.remove('goal-flash'), 600); lastH = data.home; }
        if(data.away !== lastA) { as.classList.add('goal-flash'); setTimeout(()=>as.classList.remove('goal-flash'), 600); lastA = data.away; }
        
        hs.innerText = data.home;
        as.innerText = data.away;

        const m = Math.floor(data.seconds / 60).toString().padStart(2, '0');
        const s = (data.seconds % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;

        renderCards('hC', data.homeRedCards);
        renderCards('aC', data.awayRedCards);
    });

    function renderCards(id, count) {
        const container = document.getElementById(id);
        container.innerHTML = '';
        for(let i=0; i<count; i++) {
            const card = document.createElement('div');
            card.className = 'red-card-icon';
            container.appendChild(card);
        }
    }

    const board = document.getElementById('board');
    let x=0, y=0, dx=0, dy=0, active=false;
    board.onmousedown = (e) => { active=true; dx=e.clientX-x; dy=e.clientY-y; };
    window.onmousemove = (e) => { if(active){ x=e.clientX-dx; y=e.clientY-dy; board.style.transform=`translate(${x}px,${y}px)`; } };
    window.onmouseup = () => active=false;
</script>
</body>
</html>
