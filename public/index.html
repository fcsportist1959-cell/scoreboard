<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: transparent; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; overflow: hidden; }
        
        .board { 
            position: absolute; top: 25px; left: 25px; 
            display: flex; align-items: stretch; 
            cursor: grab; filter: drop-shadow(0 10px 25px rgba(0,0,0,0.4)); 
            z-index: 1000;
        }

        /* Лява секция - Спонсор и Време */
        .brand { 
            background: linear-gradient(135deg, #1e272e 0%, #2f3640 100%);
            padding: 20px 25px; 
            display: flex; flex-direction: column; align-items: center; 
            border-radius: 25px 0 0 25px; 
            border-right: 1px solid rgba(255,255,255,0.1); 
            min-width: 110px;
        }

        /* 16-ЪГЪЛНИК (Hexadecagon) */
        .hexagon-16 { 
            width: 90px; height: 90px;
            background: white; 
            clip-path: polygon(
                50% 0%, 69.1% 3.8%, 85.4% 14.6%, 96.2% 30.9%, 
                100% 50%, 96.2% 69.1%, 85.4% 85.4%, 69.1% 96.2%, 
                50% 100%, 30.9% 96.2%, 14.6% 85.4%, 3.8% 69.1%, 
                0% 50%, 3.8% 30.9%, 14.6% 14.6%, 30.9% 3.8%
            );
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .hexagon-16 img { width: 75%; height: 75%; object-fit: contain; }

        .timer { 
            font-size: 26px; color: #00ff00; font-weight: 800; 
            font-family: 'Consolas', monospace;
            text-shadow: 0 0 12px rgba(0,255,0,0.4);
        }

        /* Секция за отбори */
        .match { 
            display: flex; flex-direction: column; 
            justify-content: center;
            gap: 5px; 
            padding: 5px 0;
            background: transparent;
        }

        .row { display: flex; height: 52px; align-items: center; }

        .name { 
            width: 320px; 
            padding: 0 25px; 
            font-size: 22px; 
            font-weight: 800; 
            text-transform: uppercase; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            height: 100%; line-height: 52px; 
            border-radius: 6px; 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: inset 0 -3px 6px rgba(0,0,0,0.1);
        }

        .score { 
            width: 70px; 
            background: #1e272e; 
            color: #f1c40f; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 30px; font-weight: 900; 
            height: 100%;
            margin-left: 3px;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Заобляне само на крайните десни ъгли на резултата */
        .row:first-child .score { border-radius: 6px 20px 6px 6px; }
        .row:last-child .score { border-radius: 6px 6px 20px 6px; }

        .cards { display: flex; gap: 5px; padding: 0 10px; }
        .red-card { 
            width: 14px; height: 20px; 
            background: linear-gradient(135deg, #ff4d4d, #b30000); 
            border-radius: 3px; 
            box-shadow: 0 3px 8px rgba(255,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .pop { animation: p 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes p { 50% { transform: scale(1.3); color: #fff; } }
    </style>
</head>
<body>

<div id="board" class="board">
    <div class="brand">
        <div class="hexagon-16">
            <!-- Място за логото на спонсора -->
            <img src="https://placeholder.com" alt="Sponsor">
        </div>
        <div id="timer" class="timer">00:00</div>
    </div>
    
    <div class="match">
        <div class="row">
            <div id="hN" class="name">HOME TEAM</div>
            <div id="hS" class="score">0</div>
            <div id="hC" class="cards"></div>
        </div>
        <div class="row">
            <div id="aN" class="name">AWAY TEAM</div>
            <div id="aS" class="score">0</div>
            <div id="aC" class="cards"></div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let lastH = 0, lastA = 0;

    function getContrast(hex){
        if(!hex) return '#ffffff';
        hex = hex.replace('#','');
        const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
        return ((r*299)+(g*587)+(b*114))/1000 >= 128 ? '#000000' : '#ffffff';
    }

    socket.on('update', (data) => {
        const hn = document.getElementById('hN'), an = document.getElementById('aN');
        hn.innerText = data.homeName; an.innerText = data.awayName;
        hn.style.backgroundColor = data.homeColor || '#ffffff';
        hn.style.color = getContrast(data.homeColor);
        an.style.backgroundColor = data.awayColor || '#ffffff';
        an.style.color = getContrast(data.awayColor);

        const hs = document.getElementById('hS'), as = document.getElementById('aS');
        if(data.home !== lastH) { hs.classList.add('pop'); setTimeout(()=>hs.classList.remove('pop'),500); lastH = data.home; }
        if(data.away !== lastA) { as.classList.add('pop'); setTimeout(()=>as.classList.remove('pop'),500); lastA = data.away; }
        hs.innerText = data.home; as.innerText = data.away;

        const m = Math.floor(data.seconds / 60).toString().padStart(2, '0');
        const s = (data.seconds % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;

        renderC('hC', data.homeRedCards); renderC('aC', data.awayRedCards);
    });

    function renderC(id, c) { 
        const r = document.getElementById(id); r.innerHTML = ''; 
        for(let i=0; i<c; i++) r.innerHTML += '<div class="red-card"></div>';
    }
    
    const b = document.getElementById('board');
    let x=0, y=0, dx=0, dy=0, active=false;
    b.onmousedown = (e) => { active=true; dx=e.clientX-x; dy=e.clientY-y; };
    window.onmousemove = (e) => { if(active){ x=e.clientX-dx; y=e.clientY-dy; b.style.transform=`translate(${x}px,${y}px)`; } };
    window.onmouseup = () => active=false;
</script>
</body>
</html>
