<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: transparent; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        .board { 
            position: absolute; top: 25px; left: 25px; 
            display: flex; align-items: stretch; 
            cursor: grab; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4)); 
            z-index: 1000;
        }

        /* Омекотена лява секция */
        .brand { 
            background: linear-gradient(135deg, #1a252f 0%, #2c3e50 100%);
            padding: 15px 20px; 
            display: flex; flex-direction: column; align-items: center; 
            border-radius: 20px 0 0 20px; /* Силно заоблени външни ъгли */
            border-right: 1px solid rgba(255,255,255,0.1); 
            min-width: 100px;
        }

        .octagon { 
            width: 80px; height: 80px;
            background: white; 
            /* Омекотен осмоъгълник със заоблени върхове чрез clip-path или просто заоблен квадрат */
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .octagon img { width: 70%; height: 70%; object-fit: contain; }

        .timer { 
            font-size: 24px; color: #00ff00; font-weight: 800; 
            font-family: 'Consolas', monospace;
            text-shadow: 0 0 10px rgba(0,255,0,0.3);
        }

        /* Секция за отбори с омекотени линии */
        .match { 
            display: flex; flex-direction: column; 
            justify-content: center;
            gap: 4px; /* Малко разстояние между отборите за "дишане" */
            padding-left: 4px;
        }

        .row { 
            display: flex; height: 50px; 
            align-items: center; 
        }

        .name { 
            width: 280px; 
            padding: 0 20px; 
            font-size: 20px; 
            font-weight: 700; 
            text-transform: uppercase; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            height: 100%; line-height: 50px; 
            border-radius: 4px; /* Леко заоблени ъгли на самите ленти */
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Резултатът като отделен омекотен елемент */
        .score { 
            width: 60px; 
            background: rgba(26, 37, 47, 0.95);
            color: #f1c40f; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 28px; font-weight: 900; 
            height: 100%;
            margin-left: 2px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* Последен ред - заобляне на десните ъгли */
        .row:first-child .score { border-radius: 4px 15px 4px 4px; }
        .row:last-child .score { border-radius: 4px 4px 15px 4px; }

        .cards { display: flex; gap: 4px; padding: 0 8px; }
        .red-card { 
            width: 12px; height: 18px; 
            background: linear-gradient(to bottom, #ff416c, #ff4b2b); /* Градиент за картон */
            border-radius: 3px; 
            box-shadow: 0 2px 6px rgba(255,0,0,0.4);
        }

        .pop { animation: p 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes p { 50% { transform: scale(1.25); color: #fff; } }
    </style>
</head>
<body>

<div id="board" class="board">
    <div class="brand">
        <div class="octagon">
            <img src="https://placeholder.com" alt="Sponsor">
        </div>
        <div id="timer" class="timer">00:00</div>
    </div>
    
    <div class="match">
        <div class="row">
            <div id="hN" class="name">HOME TEAM</div>
            <div id="hS" class="score">0</div>
            <div id="hC" class="cards"></div>
        </div>
        <div class="row">
            <div id="aN" class="name">AWAY TEAM</div>
            <div id="aS" class="score">0</div>
            <div id="aC" class="cards"></div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let lastH = 0, lastA = 0;

    function getContrast(hex){
        if(!hex) return '#ffffff';
        hex = hex.replace('#','');
        const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
        return ((r*299)+(g*587)+(b*114))/1000 >= 128 ? '#000000' : '#ffffff';
    }

    socket.on('update', (data) => {
        const hn = document.getElementById('hN'), an = document.getElementById('aN');
        hn.innerText = data.homeName;
        an.innerText = data.awayName;
        hn.style.backgroundColor = data.homeColor || '#ffffff';
        hn.style.color = getContrast(data.homeColor);
        an.style.backgroundColor = data.awayColor || '#ffffff';
        an.style.color = getContrast(data.awayColor);

        const hs = document.getElementById('hS'), as = document.getElementById('aS');
        if(data.home !== lastH) { hs.classList.add('pop'); setTimeout(()=>hs.classList.remove('pop'),500); lastH = data.home; }
        if(data.away !== lastA) { as.classList.add('pop'); setTimeout(()=>as.classList.remove('pop'),500); lastA = data.away; }
        hs.innerText = data.home; as.innerText = data.away;

        const m = Math.floor(data.seconds / 60).toString().padStart(2, '0');
        const s = (data.seconds % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;

        renderC('hC', data.homeRedCards); renderC('aC', data.awayRedCards);
    });

    function renderC(id, c) { 
        const r = document.getElementById(id); r.innerHTML = ''; 
        for(let i=0; i<c; i++) r.innerHTML += '<div class="red-card"></div>';
    }
    
    const b = document.getElementById('board');
    let x=0, y=0, dx=0, dy=0, active=false;
    b.onmousedown = (e) => { active=true; dx=e.clientX-x; dy=e.clientY-y; };
    window.onmousemove = (e) => { if(active){ x=e.clientX-dx; y=e.clientY-dy; b.style.transform=`translate(${x}px,${y}px)`; } };
    window.onmouseup = () => active=false;
</script>
</body>
</html>
