<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: transparent; font-family: 'Exo 2', sans-serif; overflow: hidden; }
        
        .board { 
            position: absolute; top: 25px; left: 25px; 
            display: flex; align-items: stretch; gap: 5px;
            cursor: grab; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); 
            z-index: 1000;
        }

        /* Скосен блок за Спонсор и Таймер */
        .brand { 
            background: #1e272e; 
            padding: 15px 25px; 
            display: flex; flex-direction: column; align-items: center; 
            transform: skewX(-10deg); /* СКОСЯВАНЕ */
            border-left: 4px solid #f1c40f;
            min-width: 100px;
        }

        /* Осмоъгълникът вътре е изправен (skew обратно), за да не криви логото */
        .octagon-wrapper { 
            transform: skewX(10deg); 
            width: 80px; height: 80px;
            background: white; 
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            display: flex; align-items: center; justify-content: center; margin-bottom: 5px;
        }
        .octagon-wrapper img { width: 70%; height: 70%; object-fit: contain; }

        .timer { 
            transform: skewX(10deg);
            font-size: 24px; color: #00ff00; font-weight: 800; font-family: monospace; 
        }

        /* Секция за отбори */
        .match { display: flex; flex-direction: column; gap: 4px; }

        .row { 
            display: flex; height: 48px; align-items: center; 
            transform: skewX(-10deg); /* СКОСЯВАНЕ на целия ред */
            overflow: hidden;
        }

        .name { 
            width: 310px; padding: 0 25px; 
            font-size: 21px; font-weight: 800; text-transform: uppercase; 
            height: 100%; line-height: 48px; 
            /* Изправяме текста обратно */
            display: flex; align-items: center;
        }
        .name span { transform: skewX(10deg); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        .score { 
            width: 65px; background: #2f3640; color: #f1c40f; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 28px; font-weight: 900; height: 100%;
            border-left: 2px solid rgba(255,255,255,0.1);
        }
        .score span { transform: skewX(10deg); }

        .cards { transform: skewX(10deg); display: flex; gap: 4px; padding-left: 10px; }
        .red-card { width: 10px; height: 15px; background: #e74c3c; border-radius: 1px; }

        .pop { animation: p 0.4s ease; }
        @keyframes p { 50% { transform: scale(1.3) skewX(10deg); color: #fff; } }
    </style>
</head>
<body>

<div id="board" class="board">
    <div class="brand">
        <div class="octagon-wrapper">
            <img src="https://placeholder.com" alt="Logo">
        </div>
        <div id="timer" class="timer">00:00</div>
    </div>
    
    <div class="match">
        <div class="row">
            <div id="hN_box" class="name"><span id="hN">HOME TEAM</span></div>
            <div class="score"><span id="hS">0</span></div>
            <div id="hC" class="cards"></div>
        </div>
        <div class="row">
            <div id="aN_box" class="name"><span id="aN">AWAY TEAM</span></div>
            <div class="score"><span id="aS">0</span></div>
            <div id="aC" class="cards"></div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let lastH = 0, lastA = 0;

    function getContrast(hex){
        hex = hex.replace('#','');
        const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
        return ((r*299)+(g*587)+(b*114))/1000 >= 128 ? '#000000' : '#ffffff';
    }

    socket.on('update', (data) => {
        const hn = document.getElementById('hN'), an = document.getElementById('aN');
        const hBox = document.getElementById('hN_box'), aBox = document.getElementById('aN_box');
        
        hn.innerText = data.homeName; an.innerText = data.awayName;
        hBox.style.backgroundColor = data.homeColor || '#ffffff';
        hBox.style.color = getContrast(data.homeColor);
        aBox.style.backgroundColor = data.awayColor || '#ffffff';
        aBox.style.color = getContrast(data.awayColor);

        const hs = document.getElementById('hS'), as = document.getElementById('aS');
        if(data.home !== lastH) { hs.parentElement.classList.add('pop'); setTimeout(()=>hs.parentElement.classList.remove('pop'),400); lastH = data.home; }
        if(data.away !== lastA) { as.parentElement.classList.add('pop'); setTimeout(()=>as.parentElement.classList.remove('pop'),400); lastA = data.away; }
        hs.innerText = data.home; as.innerText = data.away;

        const m = Math.floor(data.seconds / 60).toString().padStart(2, '0');
        const s = (data.seconds % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;
        
        renderC('hC', data.homeRedCards); renderC('aC', data.awayRedCards);
    });

    function renderC(id, c) { 
        const r = document.getElementById(id); r.innerHTML = ''; 
        for(let i=0; i<c; i++) r.innerHTML += '<div class="red-card"></div>';
    }
    
    const b = document.getElementById('board');
    let x=0, y=0, dx=0, dy=0, active=false;
    b.onmousedown = (e) => { active=true; dx=e.clientX-x; dy=e.clientY-y; };
    window.onmousemove = (e) => { if(active){ x=e.clientX-dx; y=e.clientY-dy; b.style.transform=`translate(${x}px,${y}px)`; } };
    window.onmouseup = () => active=false;
</script>
</body>
</html>
