<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: transparent; 
            margin: 0; 
            padding: 0; 
            color: white; 
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Контейнер горе вдясно */
        .scoreboard-wrapper {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            align-items: stretch;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6));
            transform: scale(1); /* Може да се промени за мащабиране */
            transform-origin: top right;
        }

        /* Ляво: Спонсор + Таймер */
        .brand-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111;
            padding: 8px 12px;
            border-right: 2px solid rgba(255,255,255,0.1);
            min-width: 70px;
            border-radius: 6px 0 0 6px;
        }

        .sponsor-logo {
            width: 45px;
            height: 45px;
            background: #fff;
            /* Модерна шестоъгълна форма (футболна топка) */
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
        }

        .sponsor-logo img {
            max-width: 75%;
            max-height: 75%;
            object-fit: contain;
        }

        .timer { 
            font-size: 18px; 
            color: #00ff00; 
            font-weight: 800;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Дясно: Отбори и Резултати */
        .match-side {
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 0 6px 6px 0;
            overflow: hidden;
        }

        .team-row {
            display: flex;
            align-items: center;
            height: 38px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .team-row:last-child { border-bottom: none; }

        .team-name { 
            width: 210px; /* Оптимално за 21 символа */
            padding: 0 15px;
            font-size: 17px; 
            font-weight: 700; 
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 38px;
            transition: background 0.5s;
        }

        .score-cell {
            width: 50px;
            background: rgba(255, 255, 255, 0.08);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            color: #ffcc00;
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        /* Индикатори за червени картони */
        .red-cards-container {
            display: flex;
            gap: 3px;
            padding: 0 8px;
        }

        .red-card-icon {
            width: 7px;
            height: 10px;
            background: #ff3b30;
            border-radius: 1px;
            box-shadow: 0 0 5px rgba(255,0,0,0.5);
        }

        /* Анимация при гол */
        .score-pop { animation: pop 0.5s ease-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); color: #fff; background: #ffcc00; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="scoreboard-wrapper">
        <!-- Секция Спонсор и Време -->
        <div class="brand-side">
            <div class="sponsor-logo">
                <!-- Път към вашето лого -->
                <img src="https://placeholder.com" alt="Logo">
            </div>
            <div id="timer" class="timer">00:00</div>
        </div>

        <!-- Секция Отбори -->
        <div class="match-side">
            <!-- Ред Домакин -->
            <div class="team-row">
                <div id="homeName" class="team-name">HOME</div>
                <div id="homeScore" class="score-cell">0</div>
                <div id="homeCards" class="red-cards-container"></div>
            </div>
            <!-- Ред Гост -->
            <div class="team-row">
                <div id="awayName" class="team-name">AWAY</div>
                <div id="awayScore" class="score-cell">0</div>
                <div id="awayCards" class="red-cards-container"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let lastScore = { home: 0, away: 0 };
        
        const formatTime = (s) => {
            if (s === undefined || s === null) return "00:00";
            const mins = Math.floor(s / 60).toString().padStart(2, '0');
            const secs = (s % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        };

        function updateRedCards(elementId, count) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';
            if (count > 0) {
                for (let i = 0; i < count; i++) {
                    const card = document.createElement('div');
                    card.className = 'red-card-icon';
                    container.appendChild(card);
                }
            }
        }

        function animateScore(el) {
            el.classList.add('score-pop');
            setTimeout(() => el.classList.remove('score-pop'), 500);
        }

        function getContrastYIQ(hexcolor){
            if (!hexcolor) return 'white';
            hexcolor = hexcolor.replace("#", "");
            if (hexcolor.length === 3) hexcolor = hexcolor.split('').map(c => c + c).join('');
            var r = parseInt(hexcolor.substr(0,2),16);
            var g = parseInt(hexcolor.substr(2,2),16);
            var b = parseInt(hexcolor.substr(4,2),16);
            var yiq = ((r*299)+(g*587)+(b*114))/1000;
            return (yiq >= 128) ? 'black' : 'white';
        }

        socket.on('update', (data) => {
            const homeEl = document.getElementById('homeName');
            const awayEl = document.getElementById('awayName');
            const hScoreEl = document.getElementById('homeScore');
            const aScoreEl = document.getElementById('awayScore');

            homeEl.innerText = data.homeName;
            awayEl.innerText = data.awayName;
            
            if (data.homeColor) {
                homeEl.style.backgroundColor = data.homeColor;
                homeEl.style.color = getContrastYIQ(data.homeColor);
            }
            if (data.awayColor) {
                awayEl.style.backgroundColor = data.awayColor;
                awayEl.style.color = getContrastYIQ(data.awayColor);
            }

            if (data.home !== lastScore.home) { animateScore(hScoreEl); lastScore.home = data.home; }
            if (data.away !== lastScore.away) { animateScore(aScoreEl); lastScore.away = data.away; }

            hScoreEl.innerText = data.home;
            aScoreEl.innerText = data.away;

            document.getElementById('timer').innerText = formatTime(data.seconds);

            updateRedCards('homeCards', data.homeRedCards);
            updateRedCards('awayCards', data.awayRedCards);
        });

        socket.on('timerUpdate', (data) => {
            const sec = typeof data === 'object' ? data.seconds : data;
            document.getElementById('timer').innerText = formatTime(sec);
        });
    </script>
</body>
</html>
