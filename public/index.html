<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background: transparent; 
            margin: 0; 
            padding: 10px; 
            color: white; 
        }
        .scoreboard { 
            display: flex; 
            align-items: center; 
            background: rgba(0, 0, 0, 0.65); 
            padding: 6px 12px; 
            border-radius: 6px; 
            width: fit-content;
            border: 1px solid rgba(255, 255, 255, 0.15);
            
            transform: scale(0.85); 
            transform-origin: top left; 
            gap: 8px; /* Още по-прибрано разстояние */
        }
        .timer { 
            font-size: 24px; 
            color: #00ff00; 
            font-family: monospace; 
            padding-right: 5px;
            border-right: 1px solid rgba(255,255,255,0.2); /* Разделител за таймера */
        }
        .team-name { 
            font-size: 20px; 
            font-weight: bold; 
            text-transform: uppercase; 
            padding: 4px 12px; 
            border-radius: 4px;
            /* Премахнато max-width, за да не реже имената */
            white-space: nowrap; 
            display: inline-block;
        }
        .score-container {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3); 
            padding: 2px 10px;
            border-radius: 4px;
            margin: 0 2px;
        }
        .score { 
            font-size: 28px; 
            font-weight: bold; 
            color: #ffcc00; 
            min-width: 20px; 
            text-align: center; 
        }
        .separator { font-size: 22px; margin: 0 3px; color: #ccc; }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div id="timer" class="timer">00:00</div>
        
        <div id="homeName" class="team-name">HOME</div>
        
        <div class="score-container">
            <div id="homeScore" class="score">0</div>
            <div class="separator">:</div>
            <div id="awayScore" class="score">0</div>
        </div>
        
        <div id="awayName" class="team-name">AWAY</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        const formatTime = (s) => {
            if (isNaN(s) || s === null) return "00:00";
            const mins = Math.floor(s / 60).toString().padStart(2, '0');
            const secs = (s % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        };

        function getContrastYIQ(hexcolor){
            if (!hexcolor) return 'white';
            hexcolor = hexcolor.replace("#", "");
            if (hexcolor.length === 3) hexcolor = hexcolor.split('').map(c => c + c).join('');
            var r = parseInt(hexcolor.substr(0,2),16);
            var g = parseInt(hexcolor.substr(2,2),16);
            var b = parseInt(hexcolor.substr(4,2),16);
            var yiq = ((r*299)+(g*587)+(b*114))/1000;
            return (yiq >= 128) ? 'black' : 'white';
        }

        socket.on('update', (data) => {
            const homeEl = document.getElementById('homeName');
            const awayEl = document.getElementById('awayName');

            homeEl.innerText = data.homeName || "HOME";
            awayEl.innerText = data.awayName || "AWAY";

            if (data.homeColor) {
                homeEl.style.backgroundColor = data.homeColor;
                homeEl.style.color = getContrastYIQ(data.homeColor);
            }
            if (data.awayColor) {
                awayEl.style.backgroundColor = data.awayColor;
                awayEl.style.color = getContrastYIQ(data.awayColor);
            }

            document.getElementById('homeScore').innerText = data.home;
            document.getElementById('awayScore').innerText = data.away;
            if (data.seconds !== undefined) {
                document.getElementById('timer').innerText = formatTime(data.seconds);
            }
        });

        socket.on('timerUpdate', (seconds) => {
            document.getElementById('timer').innerText = formatTime(seconds);
        });
    </script>
</body>
</html>
