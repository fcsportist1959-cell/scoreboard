<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: transparent; 
            margin: 0; 
            padding: 0; 
            color: white; 
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        /* Контейнер - първоначално горе вляво */
        .scoreboard-draggable {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: stretch;
            cursor: grab;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.3));
            z-index: 9999;
            transition: transform 0.1s ease;
        }
        .scoreboard-draggable:active { cursor: grabbing; }

        /* Ляво: Осмоъгълник (Спонсор) + Таймер */
        .brand-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2c3e50, #34495e); /* Свежо тъмносиньо */
            padding: 12px;
            min-width: 90px;
            border-radius: 8px 0 0 8px;
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .sponsor-logo {
            width: 60px;
            height: 60px;
            background: #fff;
            /* Форма на осмоъгълник */
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .sponsor-logo img {
            max-width: 70%;
            max-height: 70%;
            object-fit: contain;
        }

        .timer { 
            font-size: 20px; 
            color: #ecf0f1; 
            font-weight: 800;
            font-family: 'Monaco', 'Consolas', monospace;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Дясно: Отбори и Резултати */
        .match-side {
            display: flex;
            flex-direction: column;
            background: rgba(236, 240, 241, 0.95); /* Светъл, свеж фон */
            border-radius: 0 8px 8px 0;
            overflow: hidden;
            justify-content: center;
        }

        .team-row {
            display: flex;
            align-items: center;
            height: 45px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .team-row:last-child { border-bottom: none; }

        .team-name { 
            width: 230px; /* Подравнени за 21 символа */
            padding: 0 15px;
            font-size: 18px; 
            font-weight: 700; 
            text-transform: uppercase;
            color: #2c3e50; /* Тъмен текст върху светъл фон */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 45px;
        }

        .score-cell {
            width: 55px;
            background: #2c3e50;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            color: #f1c40f; /* Ярко жълто за резултата */
        }

        .red-cards-container {
            display: flex;
            gap: 4px;
            padding-left: 10px;
            min-width: 30px;
        }

        .red-card-icon {
            width: 8px;
            height: 12px;
            background: #e74c3c;
            border-radius: 1px;
        }

        /* Анимация за гол */
        .score-pop { animation: pop 0.6s ease-in-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); background: #f1c40f; color: #2c3e50; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="dragContainer" class="scoreboard-draggable">
        <!-- Спонсор и Време -->
        <div class="brand-side">
            <div class="sponsor-logo">
                <img src="https://placeholder.com" alt="Sponsor">
            </div>
            <div id="timer" class="timer">00:00</div>
        </div>

        <!-- Отбори (Перфектно подравнени) -->
        <div class="match-side">
            <div class="team-row">
                <div id="homeName" class="team-name">HOME TEAM</div>
                <div id="homeScore" class="score-cell">0</div>
                <div id="homeCards" class="red-cards-container"></div>
            </div>
            <div class="team-row">
                <div id="awayName" class="team-name">AWAY TEAM</div>
                <div id="awayScore" class="score-cell">0</div>
                <div id="awayCards" class="red-cards-container"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Логика за местене (Drag & Drop)
        const dragItem = document.getElementById("dragContainer");
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

        const dragStart = (e) => {
            initialX = (e.type === "touchstart" ? e.touches[0].clientX : e.clientX) - xOffset;
            initialY = (e.type === "touchstart" ? e.touches[0].clientY : e.clientY) - yOffset;
            if (e.target === dragItem || dragItem.contains(e.target)) active = true;
        };

        const dragEnd = () => { initialX = currentX; initialY = currentY; active = false; };

        const drag = (e) => {
            if (active) {
                e.preventDefault();
                currentX = (e.type === "touchmove" ? e.touches[0].clientX : e.clientX) - initialX;
                currentY = (e.type === "touchmove" ? e.touches[0].clientY : e.clientY) - initialY;
                xOffset = currentX; yOffset = currentY;
                dragItem.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        };

        window.addEventListener("touchstart", dragStart, false);
        window.addEventListener("touchend", dragEnd, false);
        window.addEventListener("touchmove", drag, false);
        window.addEventListener("mousedown", dragStart, false);
        window.addEventListener("mouseup", dragEnd, false);
        window.addEventListener("mousemove", drag, false);

        // Socket.io Логика
        const socket = io();
        let lastScore = { home: 0, away: 0 };
        
        const formatTime = (s) => {
            const mins = Math.floor(s / 60).toString().padStart(2, '0');
            const secs = (s % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        };

        function updateRedCards(id, count) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const card = document.createElement('div');
                card.className = 'red-card-icon';
                container.appendChild(card);
            }
        }

        socket.on('update', (data) => {
            document.getElementById('homeName').innerText = data.homeName;
            document.getElementById('awayName').innerText = data.awayName;
            
            const hScoreEl = document.getElementById('homeScore');
            const aScoreEl = document.getElementById('awayScore');

            if (data.home !== lastScore.home) { hScoreEl.classList.add('score-pop'); setTimeout(() => hScoreEl.classList.remove('score-pop'), 600); lastScore.home = data.home; }
            if (data.away !== lastScore.away) { aScoreEl.classList.add('score-pop'); setTimeout(() => aScoreEl.classList.remove('score-pop'), 600); lastScore.away = data.away; }

            hScoreEl.innerText = data.home;
            aScoreEl.innerText = data.away;
            document.getElementById('timer').innerText = formatTime(data.seconds);
            updateRedCards('homeCards', data.homeRedCards);
            updateRedCards('awayCards', data.awayRedCards);
        });

        socket.on('timerUpdate', (data) => {
            const sec = typeof data === 'object' ? data.seconds : data;
            document.getElementById('timer').innerText = formatTime(sec);
        });
    </script>
</body>
</html>
